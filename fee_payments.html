<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hostel Fee Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin: 15px 0;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

button {
    padding: 10px 15px;
    border: none;
    background: #22c55e;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:disabled {
    background: gray;
}
</style>
</head>

<body>

<div class="container">
    <h2>Hostel Fee Dashboard</h2>

    <div id="fees"></div>
</div>

<script>
const BASE_URL = window.location.hostname === "localhost"
  ? "http://localhost:3000"
  : "https://crrehostel.onrender.com";

const user_id = localStorage.getItem("user_id");

if (!user_id) {
    alert("Please login first");
    window.location.href = "index.html";
}

let reg_no = "";

async function loadFees() {
    try {
        // Step 1: Get reg_no
        const regRes = await fetch(`${BASE_URL}/api/getRegNo/${user_id}`);
        const regData = await regRes.json();
        reg_no = regData.reg_no;

        // Step 2: Get fees
        const res = await fetch(`${BASE_URL}/api/getFees?reg_no=${reg_no}`);
        const data = await res.json();

        const container = document.getElementById("fees");
        container.innerHTML = "";

        data.forEach(fee => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <div>
                    <h3>${fee.type}</h3>
                    <p>Amount: ₹${fee.amount}</p>
                </div>
                <button onclick="pay('${fee.type}', ${fee.amount})" ${fee.amount <= 0 ? "disabled" : ""}>
                    Pay
                </button>
            `;

            container.appendChild(div);
        });

    } catch (err) {
        console.error("Error loading fees:", err);
        alert("Failed to load fees");
    }
}

function pay(type, amount) {
    const upi = `upi://pay?pa=hostel@upi&pn=CRRHostel&am=${amount}&cu=INR`;

    window.location.href = upi;

    setTimeout(() => {
        const txn = prompt("Enter Transaction ID");

        if (!txn) return;

        fetch(`${BASE_URL}/api/addTransaction`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                reg_no,
                fee_type: type,
                amount,
                transaction_id: txn
            })
        })
        .then(res => res.json())
        .then(() => {
            alert("Transaction submitted!");
            loadFees();
        });
    }, 3000);
}

loadFees();
</script>
</body>
</html>
